services:
  nginx:
    image: defectdojo/defectdojo-nginx:${DD_VERSION:-2.54.3}
    ports:
      - "8080:8080"
    environment:
      NGINX_METRICS_ENABLED: "false"
    volumes:
      - defectdojo_media:/usr/share/nginx/html/media
    depends_on:
      - uwsgi

  uwsgi:
    image: defectdojo/defectdojo-django:${DD_VERSION:-2.54.3}
    entrypoint: ["/wait-for-it.sh", "postgres:5432", "-t", "30", "--", "/entrypoint-uwsgi.sh"]
    environment:
      DD_DATABASE_ENGINE: django.db.backends.postgresql
      DD_DATABASE_HOST: postgres
      DD_DATABASE_PORT: "5432"
      DD_DATABASE_NAME: defectdojo
      DD_DATABASE_USER: defectdojo
      DD_DATABASE_PASSWORD: defectdojo
      DD_SECRET_KEY: "hhZCp@D28z!n@NED*yB!RO&DP^jJ45P"
      DD_CREDENTIAL_AES_256_KEY: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      DD_ALLOWED_HOSTS: "*"
      DD_CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - defectdojo_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      initializer:
        condition: service_completed_successfully

  celerybeat:
    image: defectdojo/defectdojo-django:${DD_VERSION:-2.54.3}
    entrypoint: ["/wait-for-it.sh", "postgres:5432", "-t", "30", "--", "/entrypoint-celery-beat.sh"]
    environment:
      DD_DATABASE_ENGINE: django.db.backends.postgresql
      DD_DATABASE_HOST: postgres
      DD_DATABASE_PORT: "5432"
      DD_DATABASE_NAME: defectdojo
      DD_DATABASE_USER: defectdojo
      DD_DATABASE_PASSWORD: defectdojo
      DD_SECRET_KEY: "hhZCp@D28z!n@NED*yB!RO&DP^jJ45P"
      DD_CREDENTIAL_AES_256_KEY: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      DD_CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celeryworker:
    image: defectdojo/defectdojo-django:${DD_VERSION:-2.54.3}
    entrypoint: ["/wait-for-it.sh", "postgres:5432", "-t", "30", "--", "/entrypoint-celery-worker.sh"]
    environment:
      DD_DATABASE_ENGINE: django.db.backends.postgresql
      DD_DATABASE_HOST: postgres
      DD_DATABASE_PORT: "5432"
      DD_DATABASE_NAME: defectdojo
      DD_DATABASE_USER: defectdojo
      DD_DATABASE_PASSWORD: defectdojo
      DD_SECRET_KEY: "hhZCp@D28z!n@NED*yB!RO&DP^jJ45P"
      DD_CREDENTIAL_AES_256_KEY: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      DD_CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  initializer:
    image: defectdojo/defectdojo-django:${DD_VERSION:-2.54.3}
    entrypoint: ["/wait-for-it.sh", "postgres:5432", "-t", "30", "--", "/entrypoint-initializer.sh"]
    environment:
      DD_DATABASE_ENGINE: django.db.backends.postgresql
      DD_DATABASE_HOST: postgres
      DD_DATABASE_PORT: "5432"
      DD_DATABASE_NAME: defectdojo
      DD_DATABASE_USER: defectdojo
      DD_DATABASE_PASSWORD: defectdojo
      DD_SECRET_KEY: "hhZCp@D28z!n@NED*yB!RO&DP^jJ45P"
      DD_CREDENTIAL_AES_256_KEY: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      DD_INITIALIZE: "true"
      DD_ADMIN_USER: admin
      DD_ADMIN_PASSWORD: testpassword
      DD_ADMIN_MAIL: admin@defectdojo.local
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: defectdojo
      POSTGRES_USER: defectdojo
      POSTGRES_PASSWORD: defectdojo
    volumes:
      - defectdojo_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defectdojo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  defectdojo_media:
  defectdojo_postgres:
